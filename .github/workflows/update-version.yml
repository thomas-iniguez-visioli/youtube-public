name: Update package.json version on PR merge

on:
  pull_request:
    types: [closed]
    branches: [main, master]

jobs:
  update-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update version in package.json
        id: update-version
        run: |
          # Récupère la version actuelle
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          # Incrémente la version (exemple : patch)
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
            if [ "$MINOR" -gt 10 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
          fi

          # Met à jour la version dans package.json
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          npm version --no-git-tag-version "$NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version update
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.update-version.outputs.new_version }}"
          git push
          - name: Trigger build workflow
      - uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: build-triggered
          client-payload: '{"version": "${{ steps.update-version.outputs.new_version }}"}'
