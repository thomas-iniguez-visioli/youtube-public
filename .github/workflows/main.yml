name: Build/Release

on:
  repository_dispatch:
    types: [build-triggered]
  workflow_dispatch:
  push:
    branches: main
  release:
    types: [published]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes '### YouTube Downloader Extension' \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  build-and-upload:
    name: Build and Upload Assets
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Rollbar config
        run: |
         echo "module.exports = {
               accessToken: '${{ secrets.ROLLBAR_ACCESS_TOKEN }}',
          environment: 'production',
          captureUncaught: true,
          captureUnhandledRejections: true,
           };" > rollbar.config.cjs

      - name: Build Electron app
        run: bunx electron-builder --publish always
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload latest.yml for Auto-Update (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          gh release upload v${{ needs.prepare-release.outputs.version }} dist/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Create and Upload extension ZIP
        if: matrix.os == 'ubuntu-latest'
        run: |
          zip -r youtube-downloader-extension.zip extension/
          gh release upload v${{ needs.prepare-release.outputs.version }} youtube-downloader-extension.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  publish-release:
    name: Publish Release
    needs: [prepare-release, build-and-upload]
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish Draft Release
        run: gh release edit v${{ needs.prepare-release.outputs.version }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
