name: Build/Release

on:
  repository_dispatch:
    types: [build-triggered]
  workflow_dispatch:
  push:
    branches: main
  release:
    types: [published]

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ### YouTube Downloader Extension
            - Extension Firefox pour télécharger des vidéos YouTube.
            - Archive de l'extension incluse dans les assets.
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build and Upload Assets
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Rollbar config
        run: |
         echo "module.exports = {
               accessToken: '${{ secrets.ROLLBAR_ACCESS_TOKEN }}',
          environment: 'production',
          captureUncaught: true,
          captureUnhandledRejections: true,
           };" > rollbar.config.js

      - name: Build Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.github_token }}
          release: true
          args: "--publish always"
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Create and Upload extension ZIP
        if:  matrix.os == 'ubuntu-latest'
        run: |
          zip -r youtube-downloader-extension.zip extension/
          gh release upload v${{ needs.prepare-release.outputs.version }} youtube-downloader-extension.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [prepare-release, build-and-upload]
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish Draft Release
        run: gh release edit v${{ needs.prepare-release.outputs.version }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
