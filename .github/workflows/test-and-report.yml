name: Run Tests and Report Failures
on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Type of workflow run'
        required: true
        default: 'manual'
        type: choice
        options:
          - manual
          - scheduled
          - CI
  push:
    branches: [ master,main ]
  pull_request:
    branches: [ master,main ]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout action source
        uses: actions/checkout@v4
        with:
          repository: alphaleadership/kanbanaction
          ref: master
          path: .kanban-action
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Rollbar config (Mock)
        run: |
         echo "module.exports = {
               accessToken: 'mock',
               environment: 'test',
               captureUncaught: false,
               captureUnhandledRejections: false,
           };" > rollbar.config.cjs

      - name: Install action dependencies
        run: npm ci
        working-directory: .kanban-action
        
      - name: Log Workflow Type
        run: echo "Running workflow of type ${{ github.event.inputs.type || 'CI' }}"
      
      - name: Run Tests
        run: bun test ./tests/*.test.js --reporter=junit > test-results.xml || true
      
      - name: Report Failures
        if: always()
        working-directory: .kanban-action
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEST_RESULTS_PATH: ../test-results.xml
        run: node scripts/report-test-failures.mjs
